        /* --- ELEGANT BRANDED HEADER --- */

            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 8px;
            margin: 0;
            text-shadow: 0 0 15px var(--neon), 0 0 30px rgba(0,242,255,0.3);

            font-size: 1.1rem;

            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 300;
            opacity: 0.8;
        }

        /* --- GRID SYSTEM --- */
        .container { padding: 40px 20px; max-width: 1300px; margin: auto; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); 
            gap: 12px; 
        }

        .card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 20px 5px; border-radius: 12px; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { 
            border-color: var(--neon); transform: translateY(-5px);
            background: rgba(0, 242, 255, 0.1);
        }
        .card i { font-size: 24px; color: var(--neon); margin-bottom: 10px; display: block; }
        .card span { font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* --- DETAIL POPUP --- */
        .details { 
            display: none; grid-column: 1 / -1; background: #0f172a; 
            border: 1.5px solid var(--neon); padding: 25px; border-radius: 15px; 
            text-align: center; margin: 10px 0; animation: fadeIn 0.4s;
        }
        .details.active { display: block; }
        .wa-btn { 
            background: #25d366; color: white; padding: 10px 30px; 
            border-radius: 50px; text-decoration: none; display: inline-block; 
            margin-top: 15px; font-weight: bold; 
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.8; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .footer { text-align: center; padding: 50px; opacity: 0.5; border-top: 1px solid #1e293b; }
    </style>
</head>
