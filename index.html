<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #020617; --card: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        
        /* Header Section */
        .header { 
            background: linear-gradient(to bottom, #0f172a, var(--bg)); 
            padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--neon);
        }
        .header h1 { font-size: 2.5rem; margin: 0; text-shadow: 0 0 15px var(--neon); letter-spacing: 2px; }
        .header p { color: var(--neon); font-weight: bold; margin-top: 10px; opacity: 0.8; }

        /* Grid System */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
        }

        /* Service Cards */
        .card { 
            background: var(--card); border: 1px solid #334155; padding: 15px 5px; 
            border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); transform: scale(1.05); background: #334155; }
        .card i { font-size: 22px; color: var(--neon); margin-bottom: 8px; display: block; }
        .card span { font-size: 12px; font-weight: 600; display: block; }

        /* Detail Box */
        .details { 
            display: none; grid-column: 1 / -1; background: #0f172a; 
            border: 2px solid var(--neon); padding: 20px; border-radius: 15px; 
            text-align: center; margin: 10px 0; animation: fadeIn 0.3s;
        }
        .details.active { display: block; }
        .wa-btn { 
            background: #25d366; color: white; padding: 10px 25px; 
            border-radius: 8px; text-decoration: none; display: inline-block; 
            margin-top: 10px; font-weight: bold; 
        }

        .footer { text-align: center; padding: 30px; font-size: 12px; opacity: 0.6; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

        const target = document.getElementById(id);

        document.querySelectorAll('.details').forEach(d => d.classList.remove('active'));
        if(!active) target.classList.add('active');
