<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#0f172a; padding:10px; display:flex; justify-content:center; }
        .box { width:100%; max-width:400px; background:#fff; border-radius:15px; overflow:hidden; }
        #l-pg { padding:30px; text-align:center; }
        .logo { width:60px; height:60px; background:#1e3a8a; color:#facc15; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; margin:0 auto 10px; font-weight:bold; border:2px solid #facc15; }
        input { width:100%; padding:12px; margin:10px 0; border:1.5px solid #ddd; border-radius:8px; text-align:center; }
        .btn { width:100%; padding:12px; background:#1e3a8a; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        #d-pg { display:none; }
        .h { background:#1e3a8a; color:#fff; padding:15px; text-align:center; border-bottom:3px solid #facc15; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:10px; }
        .item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:10px; text-align:center; font-size:10px; font-weight:bold; cursor:pointer; }
        .det { display:none; background:#fff9c4; padding:5px; font-size:9px; margin-top:5px; border-radius:4px; color:#000; }
        .wa { display:block; margin-top:5px; color:#fff; background:#25d366; text-decoration:none; font-size:10px; border-radius:4px; padding:5px; font-weight:bold; }
        .f { padding:15px; text-align:center; font-size:9px; background:#f1f5f9; color:#666; }
    </style>
</head>
<body>
<div class="box">
    <div id="l-pg">
        <div class="logo">AC</div>
        <h3 style="color:#1e3a8a">ABID COMPUTERS</h3>
        <p style="font-size:10px; color:#666; margin-bottom:10px;">Mamu Kanjan Online Hub</p>
        <input type="password" id="ps" placeholder="Password: abid5550">
        <button class="btn" onclick="ok()">LOGIN DASHBOARD</button>
    </div>
    <div id="d-pg">
        <div class="h"><h3>26+ SERVICES</h3></div>
        <div class="grid" id="mG"></div>
        <div class="f">Opposite National Bank Mamu Kanjan<br>03324952550</div>
    </div>
</div>
<script>
    const svs = [
        "🔎 Lost ID Copy","👨‍👩‍👧 FRC Online","📜 Shadi Card","🛠️ Hardware",
        "🤖 AI Photo Edit","🎓 IT Diploma","⚡ Bill Payment","🚗 Vehicle Info",
        "📝 CV Maker","🛂 Passport","🏡 Domicile","📱 SIM Detail",
        "✈️ Travel History","📄 Nikah Nama","📊 Result Card","🏢 FBR / NTN",
        "📅 DOB Inquiry","💻 Windows Setup","🖨️ Color Print","📧 Email Setup",
        "💳 ATM Apply","📞 JazzCash Help","📦 Online Order","📡 CCTV Setup",
        "🩺 Health Card","📢 Ad Design"
    ];
    function ok() {
        if(document.getElementById('ps').value === "abid5550") {
            document.getElementById('l-pg').style.display = 'none';
            document.getElementById('d-pg').style.display = 'block';
            let g = document.getElementById('mG');
            if(g.innerHTML==="") svs.forEach(s => {
                let d = document.createElement('div'); d.className = 'item';
                d.innerHTML = `<div>${s}</div><div class="det">Click Below to Order:<br><a class="wa" href="https://wa.me/923324952550?text=I need ${s}" target="_blank">SEND WHATSAPP</a></div>`;
                d.onclick = (e) => {
                    if(e.target.tagName !== 'A') {
                        let div = d.querySelector('.det');
                        div.style.display = (div.style.display==='block'?'none':'block');
                    }
                };
                g.appendChild(d);
            });
        } else { alert("Wrong Password!"); }
    }
</script>
</body>
</html>
