<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">

    <title>Abid Computers | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); padding: 40px 20px; text-align: center; border-bottom: 5px solid #2563eb; }
        h1 { margin: 0; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #60a5fa; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card i { font-size: 35px; color: #60a5fa; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 0; font-weight: 500; }
        .contact-area { margin-top: 40px; text-align: center; }
        .btn { display: inline-block; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; margin: 10px; transition: 0.3s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-wa:hover { background: #128c7e; box-shadow: 0 5px 15px rgba(37,211,102,0.4); }
    </style>
</head>

<header>
    <h1>ABID COMPUTERS</h1>

<div class="container">

        <div class="card"><i class="fab fa-windows"></i><h3>Windows Setup</h3></div>
        <div class="card"><i class="fas fa-tools"></i><h3>Software Install</h3></div>
        <div class="card"><i class="fas fa-network-wired"></i><h3>Networking</h3></div>
        <div class="card"><i class="fas fa-microchip"></i><h3>Hardware Change</h3></div>
        <div class="card"><i class="fas fa-shield-halved"></i><h3>CCTV Setup</h3></div>
        <div class="card"><i class="fas fa-print"></i><h3>Online Apply</h3></div>
        <div class="card"><i class="fas fa-database"></i><h3>Data Recovery</h3></div>
    </div>

    <div class="contact-area">
        <a href="https://wa.me/923000000000" class="btn btn-wa">
            <i class="fab fa-whatsapp"></i> Contact on WhatsApp
        </a>
    </div>
</div>

</body>
</html>
