    <style>
        :root { --neon: #00f2ff; --bg: #020617; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; }
        
        /* --- ELEGANT NEON HEADER --- */
        .header { 
            padding: 80px 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            text-align: center; border-bottom: 2px solid var(--neon);
        }
        .brand-name {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900; text-transform: uppercase; letter-spacing: 10px;
            margin: 0; text-shadow: 0 0 20px var(--neon); line-height: 1.1;
        }
        .tagline {
            color: var(--neon); letter-spacing: 5px; font-size: 0.9rem;
            margin-top: 15px; text-transform: uppercase; font-weight: 300;
        }

        /* --- STABLE GRID --- */
        .container { padding: 40px 15px; max-width: 1200px; margin: auto; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; 
        }
        .card { 
            background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .card i { font-size: 24px; color: var(--neon); margin-bottom: 10px; display: block; }
        .card span { font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* --- POPUP --- */
        .details { 
            display: none; grid-column: 1 / -1; background: #0f172a; 
            border: 1px solid var(--neon); padding: 25px; border-radius: 15px; 
            text-align: center; margin: 10px 0;
        }
        .details.active { display: block; }
        .wa-btn { 
            background: #25d366; color: white; padding: 10px 25px; 
            border-radius: 50px; text-decoration: none; display: inline-block; 
            margin-top: 15px; font-weight: bold; font-size: 13px;
        }

        .footer { text-align: center; padding: 40px; opacity: 0.4; font-size: 12px; }
    </style>
</head>
