<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abid Computers | All-in-One IT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 0; }
        
        header { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1000'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        h1 { font-size: 38px; margin: 0; letter-spacing: 3px; font-weight: 700; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .loc { color: var(--primary); font-weight: bold; margin-top: 10px; display: block; }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #334155; transition: 0.4s ease; cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
        .card i { font-size: 45px; color: var(--primary); margin-bottom: 20px; }
        .card h3 { font-size: 18px; margin: 0; }

        .footer-actions { margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn { width: 80%; max-width: 400px; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-loc { background: #ef4444; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-3px); }

        @media (max-width: 600px) { h1 { font-size: 28px; } }
    </style>
</head>
<body>

<header>
    <h1>ABID COMPUTERS</h1>
    <span class="loc"><i class="fas fa-map-marker-alt"></i> Mamu Kanjan, Faisalabad</span>
</header>

<div class="container">
    <div class="grid">
        <div class="card"><i class="fas fa-laptop"></i><h3>Laptop Repairing</h3></div>
        <div class="card"><i class="fas fa-desktop"></i><h3>System Build</h3></div>
        <div class="card"><i class="fab fa-windows"></i><h3>Windows & Software</h3></div>
        <div class="card"><i class="fas fa-network-wired"></i><h3>Networking</h3></div>
        <div class="card"><i class="fas fa-microchip"></i><h3>Hardware Upgrade</h3></div>
        <div class="card"><i class="fas fa-shield-alt"></i><h3>CCTV Installation</h3></div>
        <div class="card"><i class="fas fa-print"></i><h3>Online Application</h3></div>
        <div class="card"><i class="fas fa-database"></i><h3>Data Recovery</h3></div>
    </div>

    <div class="footer-actions">
        <a href="https://wa.me/923000000000" class="btn btn-wa">
            <i class="fab fa-whatsapp"></i> WhatsApp Chat
        </a>
        <a href="https://maps.google.com" class="btn btn-loc">
            <i class="fas fa-store"></i> Shop Location
        </a>
    </div>
</div>

</body>
</html>
